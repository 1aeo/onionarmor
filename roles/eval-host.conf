# onionarmor role: eval-host
#
# Posture target for a model-evaluation host (GPU compute host), where
# nested KVM may be needed to run guest workloads. Same baseline as tor-relay
# with role-specific exceptions noted inline.

# DOC: Hide kernel pointers in /proc/kallsyms from non-root.
# REF: CIS Debian 12 §1.5.3
# COMPAT: Breaks perf-record annotate and some kernel-symbol resolvers.
kernel.kptr_restrict = 2

# DOC: Block non-root from reading dmesg.
# REF: CIS Debian 12 §1.5.4
# COMPAT: Routine debugging needs sudo.
kernel.dmesg_restrict = 1

# DOC: Disallow unprivileged BPF program loading; only CAP_BPF can load.
# REF: CIS Debian 12; kernel BPF docs
# COMPAT: bcc/bpftrace/bpftool require CAP_BPF or root.
kernel.unprivileged_bpf_disabled = 2

# DOC: EVAL-HOST EXCEPTION — kexec_load_disabled stays at 0 because nested
#      KVM guests may need kexec to fast-boot a custom kernel for evals
#      (vLLM CUDA-graph debug builds, etc.). Re-evaluate per workload; if
#      nested kexec is not in use, raise this to 1.
# REF: CIS Debian 12 (recommends 1); operator override for eval workflow.
# COMPAT: Set to 1 if you don't run nested-KVM kexec workflows.
kernel.kexec_load_disabled = 0

# DOC: Restrict ptrace to direct parent + CAP_SYS_PTRACE.
# REF: CIS Debian 12 §1.5.5
# COMPAT: gdb/strace against other-user processes needs sudo.
kernel.yama.ptrace_scope = 1

# DOC: Full ASLR.
# REF: RHEL 9 STIG
# COMPAT: None.
kernel.randomize_va_space = 2

# DOC: No setuid core dumps.
# REF: CIS Debian 12 §1.6.1.1
# COMPAT: Setuid binary debugging needs suidsafe core mode.
fs.suid_dumpable = 0

# DOC: Block cross-user hardlinks in world-writable dirs.
# REF: kernel docs
# COMPAT: None.
fs.protected_hardlinks = 1

# DOC: Block cross-user symlinks in world-writable sticky dirs.
# REF: kernel docs
# COMPAT: None.
fs.protected_symlinks = 1

# DOC: Block cross-user FIFOs in world-writable sticky dirs.
# REF: kernel docs
# COMPAT: Programs that consume cross-user FIFOs need a private dir.
fs.protected_fifos = 2

# DOC: Block cross-user regular files in world-writable sticky dirs.
# REF: kernel docs
# COMPAT: Same shape as protected_fifos.
fs.protected_regular = 2

# DOC: TCP SYN-cookies on flood.
# REF: CIS / STIG
# COMPAT: None.
net.ipv4.tcp_syncookies = 1

# DOC: Loose-mode RP filter (RFC3704 §2.4). Eval hosts often have multiple
#      NICs (mgmt + data) and asymmetric paths, so loose mode is safer than
#      strict.
# REF: RHEL 9 STIG; RFC3704
# COMPAT: Strict (1) drops asymmetric routing.
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# DOC: Refuse ICMP redirects (v4).
# REF: CIS / STIG
# COMPAT: None for an eval-host (not a router-following endpoint).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# DOC: Don't send ICMP redirects (this host is not a router).
# REF: CIS / STIG
# COMPAT: None.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# DOC: Refuse IP source-routed packets.
# REF: CIS / STIG
# COMPAT: None.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# DOC: Log martian packets to dmesg.
# REF: CIS / STIG
# COMPAT: dmesg noise; tune log rotation.
net.ipv4.conf.all.log_martians = 1

# DOC: Refuse IPv6 ICMP redirects.
# REF: CIS / STIG
# COMPAT: None.
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# DOC: Refuse IPv6 source-routed packets.
# REF: CIS / STIG
# COMPAT: None.
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
