# onionarmor role: tor-relay
#
# Posture target for a Tor relay running on Debian 12+/Ubuntu 22.04+, derived
# from the onionwarden kernel_state REFERENCE block (lib/checks/kernel_state.sh)
# and the Debian-13 fresh-install live-vs-recommended table (CIS Debian 12, RHEL 9
# STIG, Linux kernel docs).
#
# This file is a COMPLETE posture (all 25 tracked sysctls), not a delta — every
# key is listed so the role profile fully describes the host's expected state.
# Each entry carries: DOC (plain English), REF (rationale source), COMPAT
# (known gotcha or "none").
#
# Lockdown (kernel cmdline lockdown=integrity) requires a reboot and is handled
# by `onionarmor apply-lockdown`, NOT by `onionarmor apply`.

# DOC: Hide kernel pointers in /proc/kallsyms and /proc/modules from non-root,
#      blunting kernel-address exploitation that needs symbol locations.
# REF: CIS Debian 12 §1.5.3; Documentation/admin-guide/sysctl/kernel.rst
# COMPAT: Breaks tools that read /proc/kallsyms (perf-record annotate, some
#         eBPF profilers, kernel-symbol resolvers in crash analyzers).
kernel.kptr_restrict = 2

# DOC: Block non-root users from reading the kernel ring buffer (dmesg),
#      which leaks addresses, MAC addresses, hardware info, oops traces.
# REF: CIS Debian 12 §1.5.4
# COMPAT: Non-root dmesg returns empty; routine debugging needs sudo.
kernel.dmesg_restrict = 1

# DOC: Disallow unprivileged BPF program loading. Value 2 also blocks
#      CAP_SYS_ADMIN — only CAP_BPF can load programs.
# REF: CIS Debian 12; kernel BPF docs
# COMPAT: bcc/bpftrace/bpftool require CAP_BPF or root. Onionwarden's
#         eBPF inventory still works (bpftool runs as root).
kernel.unprivileged_bpf_disabled = 2

# DOC: Forbid loading a new kernel image via kexec. Closes a post-root
#      boot-bypass persistence path (staged kexec image survives reboot
#      without disk modification).
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: kexec-based fast-reboot workflows broken. Bare-metal only —
#         a KVM guest cannot stage a kexec for the host anyway. See
#         eval-host.conf for the nested-KVM exception.
kernel.kexec_load_disabled = 1

# DOC: Restrict ptrace to direct parent (and CAP_SYS_PTRACE). Stops one
#      compromised process from attaching to a sibling under the same UID.
# REF: CIS Debian 12 §1.5.5; Yama LSM docs
# COMPAT: gdb/strace against other-user or non-child processes need sudo.
kernel.yama.ptrace_scope = 1

# DOC: Full address-space layout randomization (stack, mmap, brk, vDSO).
# REF: RHEL 9 STIG; Linux ASLR docs
# COMPAT: None — full ASLR is the modern default.
kernel.randomize_va_space = 2

# DOC: Setuid binaries cannot dump core, so crashes can't leak memory to a
#      world-readable core file.
# REF: CIS Debian 12 §1.6.1.1
# COMPAT: Debugging crashes in setuid binaries (sudo, su, ping) needs
#         this temporarily set to 2 (suidsafe core).
fs.suid_dumpable = 0

# DOC: Block following hardlinks owned by another user in world-writable
#      dirs, defeating /tmp symlink/hardlink races.
# REF: Documentation/admin-guide/sysctl/fs.rst
# COMPAT: None — backward-compatible since kernel 3.6.
fs.protected_hardlinks = 1

# DOC: Block following symlinks owned by another user in world-writable
#      sticky dirs.
# REF: Documentation/admin-guide/sysctl/fs.rst
# COMPAT: None — backward-compatible since kernel 3.6.
fs.protected_symlinks = 1

# DOC: Block opening FIFOs in world-writable sticky dirs that a different
#      user owns (defeats /tmp FIFO spoofing).
# REF: Documentation/admin-guide/sysctl/fs.rst
# COMPAT: Programs that intentionally consume cross-user FIFOs in /tmp may
#         need a private dir.
fs.protected_fifos = 2

# DOC: Block opening regular files in world-writable sticky dirs that a
#      different user owns.
# REF: Documentation/admin-guide/sysctl/fs.rst
# COMPAT: Same shape as protected_fifos — uncommon to hit in practice.
fs.protected_regular = 2

# DOC: TCP SYN-cookies on SYN-flood; survives backlog overflow without
#      tracking half-open connections.
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: None — default on for years.
net.ipv4.tcp_syncookies = 1

# DOC: Loose-mode reverse-path filter (RFC3704 §2.4). Source IPs must be
#      reachable via *any* interface, not just the inbound one. Strict (1)
#      would drop legitimate asymmetric paths on a multi-IP relay.
# REF: RHEL 9 STIG; RFC3704
# COMPAT: rp_filter=1 (strict) drops asymmetric routing — that's why
#         relays use 2, not 1.
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# DOC: Refuse ICMP redirects (a downstream router telling us a better path).
#      Defeats spoofed-redirect traffic-steering attacks.
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: A host that legitimately follows ICMP redirects from its gateway
#         (rare in cloud) loses that signal.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# DOC: Don't *send* ICMP redirects. Only routers need this; a relay does not.
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: If this host is acting as a router (NAT/forwarder), set to 1.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# DOC: Refuse IP source-routed packets (LSR/SSR). Source routing is an
#      obsolete attack vector for traffic steering and origin spoofing.
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: None — source routing is effectively dead on the modern internet.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# DOC: Log packets with impossible (martian) source addresses to dmesg —
#      useful forensic signal for spoofing attempts.
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: dmesg / kern.log noise on a busy internet-facing host. Tune your
#         log rotation if needed.
net.ipv4.conf.all.log_martians = 1

# DOC: Refuse IPv6 ICMP redirects. Same rationale as the v4 entry above.
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: As v4.
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# DOC: Refuse IPv6 source-routed packets. Same rationale as the v4 entry.
# REF: CIS Debian 12; RHEL 9 STIG
# COMPAT: As v4.
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# ---------------------------------------------------------------------------
# RECOMMENDED COMPANION MODULE (not a static sysctl — do NOT add a key here).
#
# On a dense relay host, run the kernel-reserved-ports module to reserve each
# instance's loopback service ports (MetricsPort/ControlPort/...) from the
# kernel ephemeral source-port pool. The value is per-host and auto-detected
# from torrc, so it can't live in this static posture file:
#
#   sudo onionarmor apply --module kernel-reserved-ports --auto
#
# Why it matters for a relay specifically: without it, the kernel can hand one
# instance's loopback service port to another instance as an outbound *source*
# port, so the listener fails to bind and that relay never comes up (observed on
# kindaopen with MetricsPort 48082). See modules/kernel-reserved-ports/README.md.
# ---------------------------------------------------------------------------
